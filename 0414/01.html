<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상태선택자</title>
    <!-- 상태 선택자 -->
    <style>
        input:enabled{
            background-color: lightgray;
        }
        input:disabled{
            background-color: lightcoral;
        }
        input:focus{
            background-color: rgb(65, 110, 126);
        }
    </style>
</head>
<body>
    <h1>사용가능한 상태</h1>
    <input type="text"><br><br>
    <h1>사용 불가능한 상태</h1>
    <input type="text" disabled><br><br>
</body>
</html>
