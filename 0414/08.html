<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* 배경이미지 설정 방법 */
        .div1 {
            width: 300px;
            height: 300px;
            background-color: rgb(88, 15, 15);
            color: white;
            border: 10px solid #ccc;
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }
        .div2 {
            width: 300px;
            height: 300px;
            background-color: rgb(88, 15, 15);
            color: white;
            border: 20px ridge #ccc;
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }
        .div3 {
            width: 300px;
            height: 300px;
            background-color: rgb(88, 15, 15);
            color: white;
            border: 20px outset #c9e7ad;
            margin: 50px 50px 0 50px;
            padding: 0 50px 0 50px;
            text-align: center;
            line-height: 300px;
        }
    </style>
</head>
<body>
    <div class="div1">박스속성과 값을 설정 방법</div>
    <div class="div2">박스속성과 값을 설정 방법</div>
    <div class="div3">박스속성과 값을 설정 방법</div>
</body>
</html>
