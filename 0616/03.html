<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <!-- jQuery library 설정 -->
    <script src = "https://code.jquery.com/jquery-4.0.0.js"></script>
    <!-- jQuery 문법으로 작성 -->
     <script>
        $(document).ready(
            function(){
                $("h1").click(
                    function(){
                        $(this).css({  // 클릭이벤트 발생시 색상 변경
                            background : "black",
                            color : "yellow",
                            width : "200px",
                            height : "50px"
                        });
                    }
                );
                $("h1").mouseout(  // 마우스 나갔을때 원상복귀
                    function(){
                        $(this).css({
                            background : "",
                            color : "",
                        });
                    }
                );
                $("h1").dblclick(  // 더블클릭 원상복귀
                    function(){
                        $(this).css({
                            background : "",
                            color : "",
                        });
                    }
                );
            }
        );
     </script>
</head>
<body>
    <h1>Click Here!</h1>
</body>
</html>
