<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOME</title>
    <style>
        .header{
            margin: 30px auto 0 auto;
            background: linear-gradient(to right,  #fca5ff 0%,#bd7fff 50%,#23daff 100%); /* W3C, IE10+, FF16+, Chrome26+, Opera12+, Safari7+ */
        }
        .button{
            width: 150px;
            height: 50px;
            line-height: 50px;
            text-align: center;
            background-color: #fff;
            color: #000;
            font-size: 20px;
            margin: 30px auto 0 auto;
            border-radius: 10px;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class = "header">
        <h1>HOME
            <div class = "button">회원가입하기</div>
            <div class = "button">로그인하기</div>
        </h1>  
    </div>
    <div>
        <p></p>
    </div>
</body>
</html>
