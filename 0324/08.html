<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록 만들기</title>
</head>
<body>
    <h2>순서가 없는 목록</h2>
    <ul type="square">        <!-- disc(default) | circle | square -->

        <li>과일보단</li>
        <li>집에 더</li>
        <li>가고싶어요</li>
    </ul>

    <h2>순서가 있는 목록</h2>     <!-- 1(default) | A | a | I | i -->
    <ol type="1">
        <li>과일보단</li>
        <li>집에 더</li>
        <li>가고싶어요</li>
    </ol>
</body>
</html>
