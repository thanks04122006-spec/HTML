<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디스플레이 속성</title>
    <style>
        #box {
            display: inline-block;
            width: 100px;
            height: 50px;
            background-color: lightblue;
            margin: 10px;
        }
    </style>
</head>
<body>
    <p>display속성의 값중에 inline과 inline-block의 차이점을 비교해본다.</p>
    <span style="display: inline;">인라인 요소</span>
    <span>인라인 요소</span>
    <div>차이점 비교 대상</div>
    <span>인라인 요소</span>
    <p>display속성의 값중에 inline과 inline-block의 차이점을 비교해본다.</p>

</body>
</html>
