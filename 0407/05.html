<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id 선택자 연습</title>
    <style>
        #heder{
            width: 800px;
            margin: 0 auto;
            background-color: lightpink;
        }
        #aside{
            width: 200px;
            float: left;
            background-color: lightgreen;
        }
        #wrap{
            width: 800px;
            float: right;
            background-color: lightgray;
        }
        #content{
            width: 500px;
            float: left;
            background-color: lightblue;
        }
    </style>
</head>

<body>
    <div id ="heder">
        <h1>한국폴리텍대학</h1>
    </div>
    <div id = "wrap">
        <div id = "aside">
            <h1>인공지능소프트웨어과</h1>
        </div>
        <div id = "content">
            <h1>웹프로그래밍 기초</h1>
            <p>id 선택자 연습을 위한 문서입니다.</p>
        </div>
    </div>
</body>
</html>
