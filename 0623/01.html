<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <!-- jQuery library 설정 -->
    <script src = "https://code.jquery.com/jquery-4.0.0.js"></script>
    <!-- jQuery 문법으로 작성 -->
     <script>
        $(document).ready(
            function(){
                let ClearQueue = false;
                let gotoEnd = false;

                $("#ClearQueue").click(
                    function(){
                        ClearQueue = $(this).prop("checked");
                    }
                )


                $("#stopBtn").click(
                    function(){
                        $("#box").stop(ClearQueue, gotoEnd);
                    }
                )


                $("#box").css({
                    width: 100,
                    height: 100,
                    backgroundColor:"magenta"
                });
                
                $("#box").animate({
                        width:200
                    },1000)
                    .delay(1000)
                    .animate({
                        width: 100
                    },1000);
                // setInterval(function(){
                    
                // },3000);
            }
        );
     </script>
</head>
<body>
    <label>clear Queue</label>
    <input type="checkbox" id = "ClearQueue">
    <br>
    <label>gotoEnd</label>
    <input type="checkbox" id = "goToEnd">
    <br>
    <button id = "stopBtn">stop</button>
    <div id = "box"></div>
</body>
</html>
