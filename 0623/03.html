<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <script>
        window.onload = function(){
            let count = 0;
            let imges = document.getElementById("imges");

            setInterval(function(){
                imges.scr = "imges/" + (count % 15) + ".png";
                count++;
            },1000/20)

        }
     </script>
</head>
<body>
    <img id="imges">
</body>
</html>
