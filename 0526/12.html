<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id = "first_h1">DOM(문서 객체 모델)</h1>
    <h1> 요소객체가 로드 된 이후에 CSS 스타일을 변경할 수 있습니다.</h1>
    <button onclick="Darkmode()">다크 모드</button>
</body>
</html>
<script>
    function Darkmode() {
        document.body.style.backgroundColor = "rgb(35, 35, 35)";
        document.body.style.color = "rgb(255, 255, 255)";
        first_h1.style.color = "rgb(255, 255, 0)"
        first_h1.style.backgroundColor = "rgb(0, 255, 255)";
        first_h1.innerHTML = "첫 번째 h1 요소입니다.";
    }
    window.onload = function(){
        let first_h1 = document.getElementById("first_h1");
        first_h1.style.color = "rgb(0, 0, 255)";
        first_h1.style.backgroundColor = "rgb(255, 0, 0)";
        first_h1.innerHTML = "첫 번째 h1 요소입니다.";
    }

</script>
