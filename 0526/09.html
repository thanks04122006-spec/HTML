<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM(문서 객체 모델)</title>

</head>
<body>
    <h1>DOM(문서 객체 모델)</h1>
    <h2>DOM은 문서 객체 모델의 약자입니다.</h2>
</body>
</html>
<script>
        document.querySelector("h1").style.backgroundColor = "red";
        document.querySelector("h2").style.color = "magenta";
</script>
