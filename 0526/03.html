<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선언적 함수와 익명함수 실행우선순위</title>
</head>
<script>
    function anmFunc(){
            alert("선언적 함수입니다.");
        }

    anmFunc = function(){
        alert("익명함수입니다.");
    }
</script>
<body>
    <button onclick="anmFunc()">익명함수 호출</button>
</body>
</html>
